name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write     # create GitHub Release + upload assets
  id-token: write     # NuGet OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Build & test the full solution ──────────────────────────────────
      - name: Restore
        run: dotnet restore ConsoleForge.slnx

      - name: Build (Release)
        run: dotnet build ConsoleForge.slnx -c Release --no-restore

      - name: Test
        run: dotnet test ConsoleForge.slnx -c Release --no-build

      # ── Pack both packages ──────────────────────────────────────────────
      - name: Pack ConsoleForge
        run: >
          dotnet pack src/ConsoleForge/ConsoleForge.csproj
          -c Release --no-build -o ./artifacts
          -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack ConsoleForge.SourceGen
        run: >
          dotnet pack src/ConsoleForge.SourceGen/ConsoleForge.SourceGen.csproj
          -c Release --no-build -o ./artifacts
          -p:Version=${{ steps.version.outputs.VERSION }}

      # ── Publish to NuGet.org (OIDC trusted publishing) ─────────────────
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: Popplywop

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      # ── Create GitHub Release with package artifacts ────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
